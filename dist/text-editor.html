<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Editor</title>
<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background: white;
    display:flex;
    flex-direction:column;
    align-items: center;
    height:100vh;
    border: 5px solid #007bff;
}

#heading{
    align-self: center;
    justify-self: center;
}

.toolbar{
    width:100%;
    justify-items: center;
    margin-bottom: 5px;
    margin-top: 5px;

}

.toolbar-content{
    display:flex;
    gap:8px;
    padding:3px;
    width: 80%;
    border-bottom:1px solid #ccc;
    border: 1px solid black;
    border-radius: 4px;
    background: #007bff;
    align-items: center;
    justify-content:flex-start;
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior:smooth;
    background-color: #007bff;
}

.toolbar-content::-webkit-scrollbar{
    display:none;
}

.toolbar button{
    flex-shrink:0;
    padding:8px 12px;
    border:3px solid #2b2424;
    background: white;
    cursor:pointer;
    border-radius: 4px;
}

.toolbar button:hover{
    background:#eee;
}

.editor{
    flex:0.9;
    width: 80%;
    padding:20px;
    background:white;
    outline:none;
    overflow:auto;
    border: 5px solid #007bff;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

#download-button{
    position: fixed;
    bottom: 6px;
    right: 6px;
    aspect-ratio: 1;
    border-radius: 50%;
    border:3px solid #2b2424;
    background: white;
    cursor:pointer;
}

    #counterBox {
      text-align: left;
      justify-self: center;
      align-self: center;
      display: flex;
    }

    #wordCounter {
      width: 20vw;
      align-items: baseline;
      margin-top: 10px;
      border:2px solid gray;
      text-align: center;
      margin-right: 1vw;
    }

    #charCounter {
      width: 20vw;
      align-items: baseline;
      margin-top: 10px;
      border:2px solid gray;
      text-align: center;
      margin-left: 1vw;
    }

    #charCounter::placeholder {
      font-size: xx-small;
    }

      .font-family {
      margin: 10px;
      background-color: #007bff;
      border-style: solid;
      padding: 3px;
      text-align: left;
      justify-self: center;
      align-self: center;
    }

    #download-button{
        background-color: #007bff;
        padding: 5px;
        border-bottom-right-radius: 0;
    }
</style>
</head>
<body>

<h1 id="heading">Text Editor</h1>
<div class="toolbar" id="toolbar-top">
    <div class="toolbar-content" id="toolbar-content">
        <button type="button" onclick="format('b')"><b>B</b></button>
        <button type="button" onclick="format('i')"><i>I</i></button>
        <button type="button" onclick="format('u')"><u>U</u></button>
        <button type="button" onclick="format('s')"><s>A</s></button>
        <button type="button" onclick="format('mark')"><mark>A</mark></button>
        <button type="button" onclick="format('code')"><code>A</code></button>
        <button type="button" onclick="format('sup')"><sup>A</sup></button>
        <button type="button" onclick="format('sub')"><sub>A</sub></button>
    </div>
</div>

<div id="editor" class="editor" contenteditable="true">
<b>Welcome</b><br>
<p>Start Typing</p>
</div>

<div class="toolbar" id="toolbar-bottom">
    <div class="toolbar-content" id="toolbar-content-bottom">
        <button type="button" onclick="rightAlign()">➡️</button>
        <button type="button" onclick="leftAlign()">⬅️</button>
        <button type="button" onclick="centerAlign()">⬆️</button>
        <button type="button" onclick="justify()">⬇️</button>
        <button type="button" onclick="clearFormat()">✖️</button>
        <button type="button" onclick="clearEditor()">❌</button>
        <button type="button" onclick="backSpaceFun()" class="textNavBtns">⌫</button>
    </div>
</div>

  <div class="font-family">
    <select title="Select the font family for the text..." id="fontFamily">
      <option value="inherit">Default</option>
      <option value="Arial">Arial</option>
      <option value="Helvetica">Helvetica</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Verdana">Verdana</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Lucida Console">Lucida Console</option>
      <option value="monospace">Monospace</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
      <option value="fantasy">Fantasy</option>
      <option value="cursive">Cursive</option>
      <option value="gill-sans">Gill-sans</option>
    </select>
  </div>

<div id="counterBox">
    <input id="wordCounter" placeholder="WORDS HERE " disabled />
    <input id="charCounter" placeholder=" CHARCATERS  HERE" disabled />
</div>

<button id="download-button" onclick="saveFile()">💾</button>

<script>


const editor = document.getElementById("editor");

const toolbar = document.getElementById("toolbar-content");
const toolbarBottom = document.getElementById("toolbar-content-bottom");

const wordOutput = document.getElementById('wordCounter');
const charOutput = document.getElementById('charCounter');

function counters(){
  const text = editor.innerText.trim();
  wordOutput.value = text === "" ? 0 : text.split(/\s+/).length;
  charOutput.value = text.length;
}

counters();

editor.addEventListener('input', ()=>{
    counters();
});




toolbar.addEventListener("wheel", (e) => {
    e.preventDefault();

    toolbar.scrollLeft += e.deltaY;
});

toolbarBottom.addEventListener("wheel", (e) => {
    e.preventDefault();

    toolbarBottom.scrollLeft += e.deltaY;
});

document.getElementById("fontFamily").addEventListener("change", function () {
  const fam = this.value;
  const ed = editor;
  const sel = window.getSelection();
  ed.focus();

  if (sel.rangeCount > 0 && !sel.isCollapsed) {
    const rng = sel.getRangeAt(0);
    const frag = rng.extractContents();

    const sp = document.createElement("span");
    sp.style.fontFamily = fam;
    sp.appendChild(frag);

    rng.insertNode(sp);
    sel.removeAllRanges();
  } else {
    ed.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty("font-family");
    if (el.getAttribute("style")?.trim() === "") el.removeAttribute("style");
  });

  const span = document.createElement("span");
  span.style.fontFamily = fam;
  span.innerHTML = ed.innerHTML;
  ed.innerHTML = "";
  ed.appendChild(span);
  ed.focus();
  }
});

function format(tagName) {
  const selection = window.getSelection();
  editor.focus();

  if (selection.rangeCount > 0 && !selection.isCollapsed) {
    const range = selection.getRangeAt(0);
    const selectedText = range.extractContents();

    const cleanedText = document.createElement("span");
    cleanedText.innerHTML = selectedText.textContent;

    const el = document.createElement(tagName);
    el.textContent = cleanedText.textContent;

    range.insertNode(el);
    selection.removeAllRanges();
  } else {
  const tag = document.createElement(tagName);
  tag.innerHTML = editor.innerHTML;
  editor.innerHTML = "";
  editor.appendChild(tag);
}
 }

function clearFormat(){
    document.execCommand("removeFormat", false, null);

    editor.innerHTML = editor.innerHTML
    .replace(/<(\/)?(b|i|u|s|code|mark|sup|sub|span)>/gi, '');  // Fallback safety for tags like mark
    editor.style.textAlign = "left" ;
    editor.style.fontFamily = `-apple-system, BlinkMacSystemFont, "Segoe UI",
    Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif`;
    document.getElementById("fontFamily").value = "inherit";
}

function clearEditor(){
    let confirmation = confirm("Are you sure? This can not be undone.")
    if (confirmation){
      editor.innerHTML = "";
    }
}


function backSpaceFun() {
    editor.focus();
    const selection = window.getSelection();

    if (!selection.rangeCount) return;

    if (!selection.isCollapsed) {
        document.execCommand("delete");
        counters();
        return;
    }

    selection.modify("extend", "backward", "character");

    if (!selection.isCollapsed) {
        document.execCommand("delete");
    }
    counters();
}


function cleanupEmptyNodes(root) {
    const walker = document.createTreeWalker(
        root,
        NodeFilter.SHOW_ELEMENT
    );
    const toRemove = [];
    while (walker.nextNode()) {
        const node = walker.currentNode;
        if (
            node !== root &&
            node.childNodes.length === 0
        ) {
            toRemove.push(node);
        }}
    for (const node of toRemove) {
        node.remove();
    }
}

function rightAlign() { 
  editor.style.textAlign = "right";
}

function leftAlign() {
  editor.style.textAlign = "left"; 
}

function centerAlign() {
  editor.style.textAlign = "center"; 
}

function justify() {
  editor.style.textAlign = "justify";
}

function saveFile() {
  const content = editor.innerHTML;
  const fullHTML = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Downloaded Content</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          padding: 20px;
        }
      </style>
    </head>
    <body>
        <div style="text-align:${editor.style.textAlign}">
            ${editor.innerHTML}
        </div></body>
    </html>
  `;

  const blob = new Blob([fullHTML], { type: "text/html" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "new.html";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}


</script>

</body>
</html>
