<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A lightweight text editor for quick note-taking, rich-text formatting, and instant HTML export, all running directly in your browser.">
<title>Text Editor</title>
<style>
:root{
--ui-background: #f5f7fb;
--ui-panel: #ffffff;
--ui-border: #d6dde8;
--ui-border-strong: #94a3b8;
--ui-accent: #4f46e5;
--ui-btn-bg: #eef2f7;
--ui-text: #1e293b;

--ui-shadow:
0 2px 4px rgba(0,0,0,.04),
0 8px 20px rgba(0,0,0,.08);
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:var(--ui-background);
    color:var(--ui-text);
    display:flex;
    flex-direction:column;
    align-items: center;
    height:100vh;
    border-top:4px solid var(--ui-accent);
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    width: 100%;
    }

.heading-container {
      text-align: left;
      align-self: center;
      align-items: center;
      justify-items: center;
      margin: 0;
    }

.heading-container h1{
    color: var(--ui-text);
}

.format-tab, .toolbar{
    width:100%;
    justify-items: center;
    margin-bottom: 5px;
    margin-top: 5px;
}

.format-options, .toolbar-options{
    display:flex;
    gap:8px;
    padding:3px;
    width: 80%;
    border:1px solid var(--ui-border);
    border-radius: 12px;
    align-items: center;
    justify-content:flex-start;
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior:smooth;
    background-color:var(--ui-panel);
    box-shadow:var(--ui-shadow);
}

.format-tab::-webkit-scrollbar,.toolbar::-webkit-scrollbar {
    display:none;
}

.toolbar button, .format-tab button {
    flex-shrink:0;
    padding:8px 12px;
    border:1px solid var(--ui-border);
    background-color: var(--ui-btn-bg);
    cursor:pointer;
    border-radius: 8px;
    transition:0.2s ease;
}

.toolbar button:hover, .format-tab button:hover{
    background-color:var(--ui-panel);
    border-color:var(--ui-border-strong);
}

.editor{
    flex:1;
    width: 80%;
    padding:20px;
    background-color:var(--ui-panel);
    outline:none;
    overflow:auto;
    border:1px solid var(--ui-border);
    box-shadow:var(--ui-shadow);
    font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}


    #counter-box {
      text-align: left;
      justify-self: center;
      align-self: center;
      display: flex;
    }

    #word-counter {
      width: 20vw;
      align-items: baseline;
      margin-top: 10px;
      border:1px solid var(--ui-border);
      background:var(--ui-panel);
      color:var(--ui-text);
      text-align: center;
      margin-right: 1vw;
      border-radius: 8px;
    }

    #char-counter {
      width: 20vw;
      align-items: baseline;
      margin-top: 10px;
      border:1px solid var(--ui-border);
      background:var(--ui-panel);
      color:var(--ui-text);
      text-align: center;
      margin-left: 1vw;
      border-radius: 8px;
    }

    #charCounter::placeholder {
      font-size: xx-small;
    }

      .font-family {
      margin: 10px;
      background-color:var(--ui-panel);
      border:1px solid var(--ui-border);
      border-radius: 8px;
      box-shadow:var(--ui-shadow); 
      border-style: solid;
      padding: 3px;
      text-align: left;
      align-self: center;
    }

    #download-button{
    position: fixed;
    bottom: 6px;
    right: 6px;
    aspect-ratio: 1;
    border-radius: 50%;
    border:2px solid var(--ui-border);
    background-color: var(--ui-accent);
    box-shadow:var(--ui-shadow);
    cursor:pointer;
    padding: 5px;
    border-bottom-right-radius: 0;
    transition: 0.2s ease-in-out;
}

#download-button:hover{
padding: 10px;
}


.font-control-bar {
    position: absolute;
    top: 55%;
    right: 0px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 30px;
    z-index: 9999;
    padding: 0px;
    margin: 0 0.3rem;
}

.font-control-bar input[type="range"],
.font-control-bar input[type="color"] {
    writing-mode: vertical-lr;
    cursor: pointer;
    border: none;
    outline: none;
}


    #font-color-changer {
      border-radius: 50%;
      width: 20px;
      height: 40px;
      border-style: none;
    }

    
    #font-size-changer {
      transform: rotate(180deg);
    }




@media (max-width: 768px){
    .editor{
        border-width:5px;
        border-radius:10px;
    }
}

@media (max-width: 500px){
    .editor{
        border-radius:8px;
    }
}

@media (max-width: 400px){
    .editor{
        border-width:3px;
        border-radius:5px;
    }
}

@media (max-width: 300px){
    .editor{
        border-width:2px;
    }
}

</style>
</head>
<body>

<div class="container">
    <div class="heading-container">
      <h1>Text Editor</h1>
    </div>

<div class="format-tab" id="format-tab" title="Format Tab">
    <div class="format-options" id="format-options">
        <button type="button" onclick="format('b')" title="Bold"><b>B</b></button>
        <button type="button" onclick="format('i')" title="Italics"><i>I</i></button>
        <button type="button" onclick="format('u')" title="Underline"><u>U</u></button>
        <button type="button" onclick="format('s')" title="Strikethrough"><s>A</s></button>
        <button type="button" onclick="format('mark')" title="Mark"><mark>A</mark></button>
        <button type="button" onclick="format('code')" title="Code"><code>A</code></button>
        <button type="button" onclick="format('sup')" title="Supscript"><sup>A</sup></button>
        <button type="button" onclick="format('sub')" title="Subscript"><sub>A</sub></button>
    </div>
</div>

<div id="editor" class="editor" contenteditable="true">
    
</div>

<div class="toolbar" id="toolbar" title="Toolbar">
    <div class="toolbar-options" id="toolbar-options">
        <button type="button" onclick="rightAlign()" title="Right Align">➡️</button>
        <button type="button" onclick="leftAlign()" title="Left Align">⬅️</button>
        <button type="button" onclick="centerAlign()" title="Center Align">⬆️</button>
        <button type="button" onclick="justify()" title="Justify">⬇️</button>
        <button type="button" onclick="lineBreak()" title="Line Break">↩️</button>
        <button type="button" onclick="clearFormat()" title="Clear Formatting">✖️</button>
        <button type="button" onclick="clearEditor()" title="Clear Editor">❌</button>
        <button type="button" onclick="backSpaceFun()" title="Backspace">⌫</button>
    </div>
</div>

  <div class="font-family">
    <select title="Select font family" id="fontFamily">
      <option value="inherit">Default</option>
      <option value="Arial">Arial</option>
      <option value="Helvetica">Helvetica</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Verdana">Verdana</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Lucida Console">Lucida Console</option>
      <option value="monospace">Monospace</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
      <option value="fantasy">Fantasy</option>
      <option value="cursive">Cursive</option>
      <option value="gill-sans">Gill-sans</option>
    </select>
  </div>

<div id="counter-box">
    <input id="word-counter" placeholder="WORDS HERE" title="Word Counter" disabled />
    <input id="char-counter" placeholder="CHARCATERS HERE" title="Character Counter" disabled />
</div>

  <div class="font-control-bar">
    <input type="color" title="Font Color" class="font-color-changer" placeholder="Color" id="font-color-changer" />
    <input type="range" title="Font Size" class="font-size-changer" placeholder="Font Size" min="8" max="72" value="16" step="1" id="font-size-changer" />
  </div>

<button id="download-button" onclick="saveFile()" title="Download as HTML">💾</button>
</div>


<script>


const editor = document.getElementById("editor");

const formatTab = document.getElementById("format-options");
const toolbar = document.getElementById("toolbar-options");

const wordOutput = document.getElementById('word-counter');
const charOutput = document.getElementById('char-counter');

function counters(){
  const text = editor.innerText.trim();
  wordOutput.value = text === "" ? 0 : text.split(/\s+/).length;
  charOutput.value = text.length;
}

counters();

editor.addEventListener('input', ()=>{
    counters();
});

function updateToolbarLayout(el) {
    if (el.scrollWidth > el.clientWidth) {
        el.style.justifyContent = "flex-start";
        el.style.overflowX = "auto";
    } else {
        el.style.justifyContent = "center";
        el.style.overflowX = "hidden";
    }
}

function updateLayouts() {
    updateToolbarLayout(formatTab);
    updateToolbarLayout(toolbar);
}

window.addEventListener("resize", updateLayouts);
updateLayouts();


formatTab.addEventListener("wheel", (e) => {
    e.preventDefault();

    formatTab.scrollLeft += e.deltaY;
});

toolbar.addEventListener("wheel", (e) => {
    e.preventDefault();

    toolbar.scrollLeft += e.deltaY;
});

document.getElementById("fontFamily").addEventListener("change", function () {
  const fam = this.value;
  const ed = editor;
  const sel = window.getSelection();
  ed.focus();

  if (sel.rangeCount > 0 && !sel.isCollapsed) {
    const rng = sel.getRangeAt(0);
    const frag = rng.extractContents();

    const sp = document.createElement("span");
    sp.style.fontFamily = fam;
    sp.appendChild(frag);

    rng.insertNode(sp);
    sel.removeAllRanges();
  } else {
    ed.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty("font-family");
    if (el.getAttribute("style")?.trim() === "") el.removeAttribute("style");
  });

  const span = document.createElement("span");
  span.style.fontFamily = fam;
  span.innerHTML = ed.innerHTML;
  ed.innerHTML = "";
  ed.appendChild(span);
  ed.focus();
  }
});

document.getElementById("font-color-changer").addEventListener("input", function () {
  const clr = this.value;
  const ed = editor;
  const sel = window.getSelection();
  ed.focus();

  if (sel.rangeCount > 0 && !sel.isCollapsed) {
    const rng = sel.getRangeAt(0);
    const frag = rng.extractContents();

    const sp = document.createElement("span");
    sp.style.color = clr;
    sp.appendChild(frag);

    rng.insertNode(sp);
    sel.removeAllRanges();
  } else {
     ed.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty("color");
    if (el.getAttribute("style")?.trim() === "") el.removeAttribute("style");
  });

  const span = document.createElement("span");
  span.style.color = clr;
  span.innerHTML = ed.innerHTML;
  ed.innerHTML = "";
  ed.appendChild(span);
  ed.focus();
  }
});

document.getElementById("font-size-changer").addEventListener("input", function () {
  const clr = this.value + "px";
  const ed = editor;
  const sel = window.getSelection();
  ed.focus();

  if (sel.rangeCount > 0 && !sel.isCollapsed) {
    const rng = sel.getRangeAt(0);
    const frag = rng.extractContents();

    const sp = document.createElement("span");
    sp.style.fontSize = clr;
    sp.appendChild(frag);

    rng.insertNode(sp);
    sel.removeAllRanges();
  } else {
    ed.querySelectorAll('[style]').forEach(el => {
    el.style.removeProperty("font-size");
    if (el.getAttribute("style")?.trim() === "") el.removeAttribute("style");
  });

  const span = document.createElement("span");
  span.style.fontSize = clr;
  span.innerHTML = ed.innerHTML;
  ed.innerHTML = "";
  ed.appendChild(span);
  ed.focus();
  }
});

function format(tagName) {
  const selection = window.getSelection();
  editor.focus();

  if (selection.rangeCount > 0 && !selection.isCollapsed) {
    const range = selection.getRangeAt(0);
    const selectedText = range.extractContents();

    const cleanedText = document.createElement("span");
    cleanedText.innerHTML = selectedText.textContent;

    const el = document.createElement(tagName);
    el.textContent = cleanedText.textContent;

    range.insertNode(el);
    selection.removeAllRanges();
  } else {
  const tag = document.createElement(tagName);
  tag.innerHTML = editor.innerHTML;
  editor.innerHTML = "";
  editor.appendChild(tag);
}
 }

function clearFormat(){
    document.execCommand("removeFormat", false, null);

    editor.innerHTML = editor.innerHTML
    .replace(/<(\/)?(b|i|u|s|code|mark|sup|sub|span)>/gi, '');  // Fallback safety for tags like mark
    editor.style.textAlign = "left" ;
    editor.style.fontFamily = `-apple-system, BlinkMacSystemFont, "Segoe UI",
    Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif`;
    document.getElementById("fontFamily").value = "inherit";
}

function clearEditor(){
    let confirmation = confirm("Are you sure? This can not be undone.")
    if (confirmation){
      editor.innerHTML = "";
    }
}


function lineBreak() {
  const selection = window.getSelection();
  if (!selection.rangeCount) return;

  const range = selection.getRangeAt(0);

  if (!editor.contains(range.commonAncestorContainer)) return;

  range.deleteContents();
  const br = document.createElement("br");
  range.insertNode(br);

  // Move cyrsor after br
  range.setStartAfter(br);
  range.collapse(true);
  selection.removeAllRanges();
  selection.addRange(range);
}

function backSpaceFun() {
    editor.focus();
    const selection = window.getSelection();

    if (!selection.rangeCount) return;

    if (!selection.isCollapsed) {
        document.execCommand("delete");
        counters();
        return;
    }

    selection.modify("extend", "backward", "character");

    if (!selection.isCollapsed) {
        document.execCommand("delete");
    }
    counters();
}


function cleanupEmptyNodes(root) {
    const walker = document.createTreeWalker(
        root,
        NodeFilter.SHOW_ELEMENT
    );
    const toRemove = [];
    while (walker.nextNode()) {
        const node = walker.currentNode;
        if (
            node !== root &&
            node.childNodes.length === 0
        ) {
            toRemove.push(node);
        }}
    for (const node of toRemove) {
        node.remove();
    }
}

function rightAlign() { 
  editor.style.textAlign = "right";
}

function leftAlign() {
  editor.style.textAlign = "left"; 
}

function centerAlign() {
  editor.style.textAlign = "center"; 
}

function justify() {
  editor.style.textAlign = "justify";
}

function saveFile() {
  const content = editor.innerHTML;
  const fullHTML = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <title>Downloaded Content</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          padding: 20px;
        }
      </style>
    </head>
    <body>
        <div style="text-align:${editor.style.textAlign}">
            ${editor.innerHTML}
        </div></body>
    </html>
  `;

  const blob = new Blob([fullHTML], { type: "text/html" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "new.html";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}


</script>

</body>
</html>
