<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A lightweight text editor for quick note-taking, rich-text formatting, and instant HTML export, all running directly in your browser.">
<title>Text Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="heading-container">
      <h1>Text Editor</h1>
    </div>

<div class="format-tab" id="format-tab">
    <div class="format-options" id="format-options">
        <button type="button" onclick="format('b')"><b>B</b></button>
        <button type="button" onclick="format('i')"><i>I</i></button>
        <button type="button" onclick="format('u')"><u>U</u></button>
        <button type="button" onclick="format('s')"><s>A</s></button>
        <button type="button" onclick="format('mark')"><mark>A</mark></button>
        <button type="button" onclick="format('code')"><code>A</code></button>
        <button type="button" onclick="format('sup')"><sup>A</sup></button>
        <button type="button" onclick="format('sub')"><sub>A</sub></button>
    </div>
</div>

<div id="editor" class="editor" contenteditable="true">
    
</div>

<div class="toolbar" id="toolbar">
    <div class="toolbar-options" id="toolbar-options">
        <button type="button" onclick="rightAlign()">➡️</button>
        <button type="button" onclick="leftAlign()">⬅️</button>
        <button type="button" onclick="centerAlign()">⬆️</button>
        <button type="button" onclick="justify()">⬇️</button>
        <button type="button" onclick="lineBreak()">↩️</button>
        <button type="button" onclick="clearFormat()">✖️</button>
        <button type="button" onclick="clearEditor()">❌</button>
        <button type="button" onclick="backSpaceFun()">⌫</button>
    </div>
</div>

  <div class="font-family">
    <select title="Select the font family for the text..." id="fontFamily">
      <option value="inherit">Default</option>
      <option value="Arial">Arial</option>
      <option value="Helvetica">Helvetica</option>
      <option value="Courier New">Courier New</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Verdana">Verdana</option>
      <option value="Trebuchet MS">Trebuchet MS</option>
      <option value="Lucida Console">Lucida Console</option>
      <option value="monospace">Monospace</option>
      <option value="Comic Sans MS">Comic Sans MS</option>
      <option value="fantasy">Fantasy</option>
      <option value="cursive">Cursive</option>
      <option value="gill-sans">Gill-sans</option>
    </select>
  </div>

<div id="counter-box">
    <input id="word-counter" placeholder="WORDS HERE" disabled />
    <input id="char-counter" placeholder="CHARCATERS HERE" disabled />
</div>

  <div class="font-control-bar">
    <input type="color" title="Font Color" class="font-color-changer" placeholder="Color" id="font-color-changer" />
    <input type="range" title="Font Size" class="font-size-changer" placeholder="Font Size" min="8" max="72" value="16" step="1" id="font-size-changer" />
  </div>

<button id="download-button" onclick="saveFile()">💾</button>
</div>


<script src="script.js"></script>

</body>
</html>
