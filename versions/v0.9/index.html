<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Editor</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background: white;
    display:flex;
    flex-direction:column;
    align-items: center;
    height:100vh;
    border: 5px solid #007bff;
}

#heading{
    align-self: center;
    justify-self: center;
}

.toolbar{
    width:100%;
    justify-items: center;
    margin-bottom: 5%;
    margin-top: 3%;

}

.toolbar-content{
    display:flex;
    gap:8px;
    padding:3px;
    width: 80%;
    border-bottom:1px solid #ccc;
    border: 1px solid black;
    border-radius: 4px;
    background: #007bff;
    align-items: center;
    justify-content:flex-start;
    overflow-x: auto;
    scrollbar-width: none;
    scroll-behavior:smooth;
    background-color: #007bff;
}

.toolbar-content::-webkit-scrollbar{
    display:none;
}

.toolbar button{
    flex-shrink:0;
    padding:8px 12px;
    border:3px solid #2b2424;
    background: white;
    cursor:pointer;
    border-radius: 4px;
}

.toolbar button:hover{
    background:#eee;
}

.editor{
    flex:0.9;
    width: 80%;
    padding:20px;
    background:white;
    outline:none;
    overflow:auto;
    border: 5px solid #007bff;
}

#download-button{
    position: fixed;
    bottom: 6px;
    right: 6px;
    aspect-ratio: 1;
    border-radius: 50%;
    border:3px solid #2b2424;
    background: white;
    cursor:pointer;
}

    #counterBox {
      text-align: left;
      justify-self: center;
      align-self: center;
      display: flex;
    }

    #wordCounter {
      width: 20vw;
      align-items: baseline;
      margin-top: 5%;
      border:2px solid gray;
      text-align: center;
      margin-right: 1vw;
    }

    #charCounter {
      width: 20vw;
      align-items: baseline;
      margin-top: 5%;
      border:2px solid gray;
      text-align: center;
      margin-left: 1vw;
    }

    #charCounter::placeholder {
      font-size: xx-small;
    }


</style>
</head>
<body>

<h1 id="heading">Text Editor</h1>
<div class="toolbar" id="toolbar">
    <div class="toolbar-content" id="toolbar-content">
        <button onclick="format('bold')"><b>B</b></button>
        <button onclick="format('italic')"><i>I</i></button>
        <button onclick="format('underline')"><u>U</u></button>
    </div>
</div>

<div id="editor" class="editor" contenteditable="true">

<h1>Welcome</h1>
<p>Start typing...</p>
</div>

<div class="toolbar" id="toolbar">
    <div class="toolbar-content" id="toolbar-content-bottom">
        <button onclick="clearFormat()">Clear Format</button>
        <button onclick="clearEditor()">Clear</button>
    </div>
</div>

<div id="counterBox">
    <input id="wordCounter" placeholder="WORDS HERE " disabled />
    <input id="charCounter" placeholder=" CHARCATERS  HERE" disabled />
</div>

<button id="download-button" onclick="saveFile()">Save</button>

<script>

const editor = document.getElementById("editor");

const toolbar = document.getElementById("toolbar-content");
const toolbarBottom = document.getElementById("toolbar-content-bottom");

const wordOutput = document.getElementById('wordCounter');
const charOutput = document.getElementById('charCounter');

editor.addEventListener('input', () => {
  const text = editor.innerText.trim();
  wordOutput.value = text === "" ? 0 : text.split(/\s+/).length;
  charOutput.value = text.length;
});


toolbar.addEventListener("wheel", (e) => {
    e.preventDefault();

    toolbar.scrollLeft += e.deltaY;
});

toolbarBottom.addEventListener("wheel", (e) => {
    e.preventDefault();

    toolbarBottom.scrollLeft += e.deltaY;
});


function format(command){
    document.execCommand(command,false,null);
}


function clearFormat(){
    document.execCommand("removeFormat", false, null);
}

function clearEditor(){
    editor.innerHTML = "";
}

function saveFile(){

    const blob = new Blob([editor.innerHTML],{type:"text/html"});

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "document.html";
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
